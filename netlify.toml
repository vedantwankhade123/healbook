[build]
  # Work around npm optional-dependency bug in CI for Rollup/LightningCSS native binaries.
  command = "npm install --no-save @rollup/rollup-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu && npm run build"
  publish = "client/dist"

[functions]
  # Netlify will look for functions in the server build output
  directory = "server/dist"
  node_bundler = "esbuild"

[[redirects]]
  # Route all /api/* calls to our Express Lambda function
  from = "/api/*"
  to = "/.netlify/functions/lambda"
  status = 200

[[redirects]]
  # Support React Router's client-side routing on Netlify
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    # Required for Firebase Auth popups to work correctly without being blocked by modern browser security
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Embedder-Policy = "unsafe-none"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

